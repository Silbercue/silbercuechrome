id: article-reader
name: Article Reader
description: >-
  Recognizes article and long-form content patterns — a main content area
  with headings and article semantics. Scrolls to the main content region.
schema_version: "1.0"
source: seed
version: "1.0.0"
author: "Julian Friedrich"
harvest_count: 0

structure_signature:
  - signal: "role:article"
    weight: 0.9
  - signal: "role:heading"
    weight: 0.5
  - signal: "role:main"
    weight: 0.7

counter_signals:
  - signal: "role:list>10"
    level: strong

parameters: {}

execution_sequence:
  - action: scroll
    target: "[role=main], article, main"

test_cases:
  - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Functions"
  - "https://en.wikipedia.org/wiki/Browser_automation"
  - "https://web.dev/articles/vitals"
