id: search-result-list
name: Search Result List
description: >-
  Recognizes search result page patterns — a search input field followed by
  an ordered list of result items. Fills search query and triggers search.
schema_version: "1.0"
source: seed
version: "1.0.0"
author: "Julian Friedrich"
harvest_count: 0

structure_signature:
  - signal: "role:search"
    weight: 0.9
  - signal: "role:list"
    weight: 0.6
  - signal: "role:listitem"
    weight: 0.5

counter_signals:
  - signal: "type:password"
    level: strong

parameters:
  search_query:
    type: string
    description: "Search term to enter into the search field"
    required: true

execution_sequence:
  - action: fill
    target: "[role=search] input, [type=search], [name=q], [name=query]"
    param_ref: search_query
  - action: press_key
    target: "[role=search] input, [type=search], [name=q], [name=query]"
    value: Enter

test_cases:
  - "https://en.wikipedia.org/w/index.php?search=browser+automation&title=Special%3ASearch"
  - "https://search.nixos.org/packages?query=chrome"
  - "https://docs.python.org/3/search.html?q=subprocess"
