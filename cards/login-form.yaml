id: login-form
name: Login Form
description: >-
  Recognizes login form patterns — username/email field, password field,
  and submit button. Fills credentials and submits the form.
schema_version: "1.0"
source: seed
version: "1.0.0"
author: "Julian Friedrich"
harvest_count: 0

structure_signature:
  - signal: "role:form"
    weight: 0.6
  - signal: "type:password"
    weight: 0.9
  - signal: "type:submit"
    weight: 0.5
  - signal: "autocomplete:username"
    weight: 0.7

counter_signals:
  - signal: "role:search"
    level: strong
  - signal: "role:navigation"
    level: soft

parameters:
  username:
    type: string
    description: "Username or email address for login"
    required: true
  password:
    type: string
    description: "Password for login"
    required: true

execution_sequence:
  - action: fill
    target: "[autocomplete=username], [type=email], [name=username], [name=email]"
    param_ref: username
  - action: fill
    target: "[type=password]"
    param_ref: password
  - action: click
    target: "[type=submit], button[type=submit]"

test_cases:
  - "https://practicetestautomation.com/practice-test-login/"
  - "https://the-internet.herokuapp.com/login"
  - "https://demo.applitools.com/"
