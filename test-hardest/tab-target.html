<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tab Target</title>
  <style>
    body { font-family: system-ui; background: #0a0a0f; color: #e0e0e8; padding: 40px; }
    h1 { color: #6c5ce7; margin-bottom: 24px; }
    .value-box { background: #12121a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 24px; display: inline-block; }
    .value-box p { color: #888899; font-size: 0.9rem; margin-bottom: 8px; }
    .value { font-size: 1.5rem; font-weight: 700; font-family: monospace; color: #00cec9; letter-spacing: 0.1em; }
    .hint { margin-top: 24px; color: #888899; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>SilbercueChrome — Tab Target</h1>
  <p style="color:#888899;margin-bottom:24px">T2.5: Tab Management Test Page</p>
  <div class="value-box">
    <p>The secret value for this tab is:</p>
    <div class="value" id="tab-value">---</div>
  </div>
  <p class="hint">Copy this value, switch back to the main tab, paste it and verify.</p>
  <script>
    const token = localStorage.getItem('_bench_tab_token') || 'NO-TOKEN';
    document.getElementById('tab-value').textContent = token;
  </script>
</body>
</html>
